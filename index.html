100%); transition: width 0.3s; } </style> </head> <body> <div class="container"> <h1>🫀 Herzchirurgie Quiz</h1> <p class="subtitle">Wissenstest für Pflegekräfte</p> <div class="progress-bar"> <div class="progress-fill" id="progressBar"></div> </div> <div id="quizContainer"></div> <div class="result" id="result"> <h2 class="result-message" id="resultMessage"></h2> <div class="score" id="score"></div> <button class="btn" onclick="restartQuiz()">Quiz wiederholen</button> </div> <button class="btn" id="nextBtn" onclick="nextQuestion()" style="display: none;">Weiter</button> </div> <script> const questions = [ { question: "Was ist die Hauptfunktion der Koronararterien?", options: [ "Sauerstoffversorgung des Herzmuskels", "Bluttransport zur Lunge", "Regulation des Blutdrucks", "Produktion von Hormonen" ], correct: 0 }, { question: "Welche Komplikation ist nach einer Herzoperation am häufigsten?", options: [ "Nierenversagen", "Vorhofflimmern", "Schlaganfall", "Leberversagen" ], correct: 1 }, { question: "Was bedeutet CABG?", options: [ "Cardiac Artery Bypass Graft", "Coronary Artery Bypass Graft", "Cardiac Atrial Bypass Graft", "Coronary Atrial Bypass Graft" ], correct: 1 }, { question: "Welcher Normalwert gilt für den zentralen Venendruck (ZVD)?", options: [ "0-2 mmHg", "2-8 mmHg", "10-15 mmHg", "15-20 mmHg" ], correct: 1 }, { question: "Was ist das Hauptziel der Extubation nach Herzoperationen?", options: [ "Reduktion der Sedierung", "Wiederherstellung der spontanen Atmung", "Verbesserung der Mobilisation", "Verringerung der Infektionsgefahr" ], correct: 1 }, { question: "Welches Medikament wird häufig zur Thromboseprophylaxe nach Herzoperationen eingesetzt?", options: [ "Aspirin", "Heparin", "Warfarin", "Alle oben genannten" ], correct: 3 }, { question: "Was ist ein Perikarderguss?", options: [ "Flüssigkeitsansammlung im Herzbeutel", "Entzündung des Herzmuskels", "Blutung in der Lunge", "Verstopfung der Koronararterien" ], correct: 0 }, { question: "Welche Herzklappen befinden sich auf der linken Seite des Herzens?", options: [ "Trikuspidalklappe und Pulmonalklappe", "Mitralklappe und Aortenklappe", "Mitralklappe und Pulmonalklappe", "Aortenklappe und Trikuspidalklappe" ], correct: 1 }, { question: "Was ist die Ejektionsfraktion (EF)?", options: [ "Menge des Blutes, die pro Herzschlag ausgeworfen wird", "Geschwindigkeit des Blutflusses", "Druck in den Herzkammern", "Anzahl der Herzschläge pro Minute" ], correct: 0 }, { question: "Welche Drainage wird nach Herzoperationen typischerweise gelegt?", options: [ "Magensonde", "Thoraxdrainage", "Blasenkatheter", "Peritonealdrainage" ], correct: 1 }, { question: "Was ist das Hauptziel der Herz-Lungen-Maschine während einer Operation?", options: [ "Überwachung der Vitalzeichen", "Übernahme der Herz- und Lungenfunktion", "Kühlung des Körpers", "Verabreichung von Medikamenten" ], correct: 1 }, { question: "Welcher Parameter wird mit dem Swan-Ganz-Katheter gemessen?", options: [ "Arterieller Blutdruck", "Pulmonalarteriendruck", "Sauerstoffsättigung", "Herzfrequenz" ], correct: 1 }, { question: "Was ist Kardioplegie?", options: [ "Herzstillstand durch Medikamente während der Operation", "Herzrhythmusstörung", "Herzinsuffizienz", "Herzentzündung" ], correct: 0 }, { question: "Welches Symptom deutet auf eine Herztamponade hin?", options: [ "Hoher Blutdruck", "Niedriger ZVD", "Gedämpfte Herztöne und niedriger Blutdruck", "Erhöhte Urinausscheidung" ], correct: 2 }, { question: "Was ist die normale Herzfrequenz eines Erwachsenen in Ruhe?", options: [ "40-60 Schläge/min", "60-100 Schläge/min", "100-120 Schläge/min", "120-140 Schläge/min" ], correct: 1 } ]; let currentQuestion = 0; let score = 0; let selectedAnswer = null; function loadQuestion() { const container = document.getElementById('quizContainer'); const question = questions[currentQuestion]; container.innerHTML = ` <div class="question-container active"> <div class="question-number">Frage ${currentQuestion + 1} von ${questions.length}</div> <div class="question">${question.question}</div> <div class="options"> ${question.options.map((option, index) => ` <div class="option" onclick="selectAnswer(${index})">${option}</div> `).join('')} </div> </div> `; updateProgress(); selectedAnswer = null; document.getElementById('nextBtn').style.display = 'none'; } function selectAnswer(index) { if (selectedAnswer !== null) return; selectedAnswer = index; const options = document.querySelectorAll('.option'); const correct = questions[currentQuestion].correct; options[index].classList.add('selected'); setTimeout(() => { options[correct].classList.add('correct'); if (index !== correct) { options[index].classList.add('incorrect'); } else { score++; } options.forEach(opt => opt.style.pointerEvents = 'none'); document.getElementById('nextBtn').style.display = 'block'; }, 300); } function nextQuestion() { currentQuestion++; if (currentQuestion < questions.length) { loadQuestion(); } else { showResult(); } } function updateProgress() { const progress = ((currentQuestion) / questions.length) * 100; document.getElementById('progressBar').style.width = progress + '%'; } function showResult() { document.getElementById('quizContainer').style.display = 'none'; document.getElementById('nextBtn').style.display = 'none'; document.getElementById('progressBar').style.width = '100%'; const result = document.getElementById('result'); const percentage = (score / questions.length) * 100; let message = ''; if (percentage >= 90) { message = '🏆 Ausgezeichnet!'; } else if (percentage >= 70) { message = '👍 Sehr gut!'; } else if (percentage >= 50) { message = '✓ Gut gemacht!'; } else { message = '📚 Weiter üben!'; } document.getElementById('resultMessage').textContent = message; document.getElementById('score').textContent = `${score} / ${questions.length}`; result.classList.add('active'); } function restartQuiz() { currentQuestion = 0; score = 0; selectedAnswer = null; document.getElementById('result').classList.remove('active'); document.getElementById('quizContainer').style.display = 'block'; loadQuestion(); } // Start quiz loadQuestion(); </script> </body> </html>
